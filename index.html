<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 40px auto;
            max-width: 900px;
            padding: 0 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }
        pre, code {
            background-color: #f6f8fa;
            border-radius: 3px;
            padding: 0.2em 0.4em;
        }
        pre {
            padding: 16px;
            overflow: auto;
        }
        blockquote {
            border-left: 4px solid #ddd;
            margin: 0;
            padding-left: 16px;
            color: #555;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
    </style>
</head>
<body>
    <div id="content"></div>

    <script>
        fetch('LICENSE.MD')
            .then(response => {
                if (!response.ok) throw new Error('Файл LICENSE.MD не найден');
                return response.text();
            })
            .then(markdown => {
                // Простейшее преобразование Markdown в HTML
                let html = markdown
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    // Заголовки
                    .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                    .replace(/^## (.*$)/gm, '<h2>$2</h2>')
                    .replace(/^### (.*$)/gm, '<h3>$3</h3>')
                    // Жирный и курсив
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    // Ссылки
                    .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>')
                    // Списки
                    .replace(/^\* (.*$)/gm, '<ul><li>$1</li></ul>')
                    .replace(/^\d+\. (.*$)/gm, '<ol><li>$1</li></ol>')
                    // Код
                    .replace(/`(.*?)`/g, '<code>$1</code>')
                    .replace(/```(.*?)```/gs, '<pre><code>$1</code></pre>');
                
                // Упрощаем вложенные списки (базово)
                html = html.replace(/<\/ul>\s*<ul>/g, '');
                html = html.replace(/<\/ol>\s*<ol>/g, '');
                
                document.getElementById('content').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('content').innerHTML = '<p style="color:red;">Ошибка: файл LICENSE.MD не загружен. Убедитесь, что он есть в корне репозитория.</p>';
            });
    </script>
</body>
</html>
